name: Deploy to Cloudflare

on:
  push:
    branches:
      - main

jobs:
  filter:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Filter Paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'src/**'
              - 'public/**'
              - 'index.html'
              - 'vite.config.ts'
              - 'package.json'
              - 'bun.lock'
              - 'tsconfig.json'
              - 'tsconfig.app.json'
              - 'tsconfig.node.json'
              - '.github/workflows/deploy.yml'
            backend:
              - 'server/**'
              - 'wrangler.toml'
              - 'package.json'
              - 'bun.lock'
              - '.github/workflows/deploy.yml'

  deploy-pages:
    name: Deploy Frontend to Cloudflare Pages
    needs: filter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Frontend
        run: bun run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: campusflowapp  # Replace with your actual Cloudflare Pages project name
          directory: dist

  deploy-worker:
    name: Deploy Backend to Cloudflare Workers
    needs: filter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Deploy Worker
        run: bunx wrangler deploy server/index.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
